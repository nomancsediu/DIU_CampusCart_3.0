{% extends "base.html" %}
{% block title %}Edit Product • CampusCart Lite{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
  <h1 class="text-2xl font-bold mb-2">Edit Product</h1>
  <p class="text-slate-600 mb-6">Update your product information.</p>

  <form method="post" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-medium mb-1">Title</label>
      <input type="text" name="title" value="{{ product.title }}" required
             class="w-full rounded-xl border border-slate-300 px-3 py-2">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Price</label>
      <input type="number" name="price" value="{{ product.price }}" required
             class="w-full rounded-xl border border-slate-300 px-3 py-2">
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Category</label>
      <select name="category"
              class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white">
        <option value="">Select Category</option>
        {% for cat in categories %}
          <option value="{{ cat.id }}"
            {% if product.category and product.category.id == cat.id %}selected{% endif %}>
            {{ cat.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Condition</label>
      <select name="condition"
              class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white">
        <option value="NEW" {% if product.condition == "NEW" %}selected{% endif %}>New</option>
        <option value="USED" {% if product.condition == "USED" %}selected{% endif %}>Used</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Description</label>
      <textarea name="description" rows="4" required
                class="w-full rounded-xl border border-slate-300 px-3 py-2">{{ product.description }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Change Image (optional)</label>
      <input type="file" name="image" accept="image/*"
             class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white">
      {% if product.image %}
        <p class="text-xs text-slate-500 mt-2">Current image: {{ product.image.name }}</p>
      {% endif %}
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="flex-1 bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800">
        Save Changes
      </button>

      <a href="{% url 'product_detail' product.id %}"
         class="flex-1 text-center py-3 rounded-xl border border-slate-300 bg-white hover:bg-slate-50">
        Cancel
      </a>
    </div>
  </form>
</div>

{% endblock %}
