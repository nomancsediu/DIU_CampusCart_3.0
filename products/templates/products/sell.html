{% extends "base.html" %}
{% block title %}Sell Product • CampusCart Lite{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto">

  <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">

    <!-- Heading -->
    <h1 class="text-2xl font-bold mb-2">Sell a Product</h1>
    <p class="text-slate-600 mb-6">
      Fill in the details to list your product.
    </p>

    <!-- Form -->
    <form method="post" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}

      <!-- Title -->
      <div>
        <label class="block text-sm font-medium mb-1">Product Title</label>
        <input type="text"
               name="title"
               required
               class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900">
      </div>

      <!-- Price -->
      <div>
        <label class="block text-sm font-medium mb-1">Price</label>
        <input type="number"
               name="price"
               required
               class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900">
      </div>

      <!-- Category -->
      <div>
        <label class="block text-sm font-medium mb-1">Category</label>
        <select name="category"
                class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900">

          <option value="">Select Category</option>

          {% for category in categories %}
            <option value="{{ category.id }}">
              {{ category.name }}
            </option>
          {% endfor %}

        </select>
      </div>

      <!-- Condition -->
      <div>
        <label class="block text-sm font-medium mb-1">Condition</label>
        <select name="condition"
                class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900">
          <option value="NEW">New</option>
          <option value="USED">Used</option>
        </select>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea name="description"
                  rows="4"
                  required
                  class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"></textarea>
      </div>

      <!-- Image Upload -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Product Image (Optional)
        </label>
        <input type="file"
               name="image"
               accept="image/*"
               class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white">
      </div>

      <!-- Submit Button -->
      <button type="submit"
              class="w-full bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800 transition">
        Publish Product
      </button>

    </form>

  </div>

</div>

{% endblock %}
