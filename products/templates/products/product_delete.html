{% extends "base.html" %}
{% block title %}Delete Product • CampusCart Lite{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
  <h1 class="text-2xl font-bold">Delete Product</h1>
  <p class="text-slate-600 mt-2">
    Are you sure you want to delete <span class="font-semibold">{{ product.title }}</span>?
  </p>

  <form method="post" class="mt-6 flex gap-3">
    {% csrf_token %}
    <button type="submit"
            class="flex-1 bg-red-600 text-white py-3 rounded-xl hover:bg-red-700">
      Yes, Delete
    </button>
    <a href="{% url 'product_detail' product.id %}"
       class="flex-1 text-center py-3 rounded-xl border border-slate-300 bg-white hover:bg-slate-50">
      Cancel
    </a>
  </form>
</div>

{% endblock %}
