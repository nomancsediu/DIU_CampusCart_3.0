{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-4">

    <h2 class="text-xl font-bold mb-6 text-center">My Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-4 bg-white p-6 rounded shadow">
        {% csrf_token %}

        <!-- Profile Photo -->
        {% if profile.profile_photo %}
            <img src="{{ profile.profile_photo.url }}"
                 class="w-20 h-20 rounded-full mx-auto">
        {% endif %}
        <input type="file" name="profile_photo" class="w-full border p-2 rounded">

        <!-- Full Name -->
        <input type="text" name="full_name"
               value="{{ profile.user.get_full_name }}"
               placeholder="Full Name"
               class="w-full border p-2 rounded">

        <!-- Email -->
        <input type="email" name="email"
               value="{{ profile.user.email }}"
               placeholder="Email"
               class="w-full border p-2 rounded">

        <!-- Bio -->
        <textarea name="bio" rows="2"
                  placeholder="Bio"
                  class="w-full border p-2 rounded">{{ profile.bio }}</textarea>

        <!-- Department -->
        <input type="text" name="department"
               value="{{ profile.department }}"
               placeholder="Department"
               class="w-full border p-2 rounded">

        <!-- Batch -->
        <input type="text" name="batch"
               value="{{ profile.batch }}"
               placeholder="Batch"
               class="w-full border p-2 rounded">

        <!-- Phone -->
        <input type="text" name="phone"
               value="{{ profile.phone }}"
               placeholder="Phone"
               class="w-full border p-2 rounded">

        <button type="submit"
                class="w-full bg-emerald-600 text-white py-2 rounded">
            Update Profile
        </button>
    </form>

</div>
{% endblock %}
