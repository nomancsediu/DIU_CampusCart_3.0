{% extends 'base.html' %}
{% block title %}Profile - DIU CampusCart{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">

    <h1 class="text-2xl sm:text-3xl font-bold mb-6">My Profile</h1>

    <div class="bg-white border border-gray-200 rounded-lg p-4 sm:p-6 shadow">
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            <!-- Profile Photo -->
            <div class="flex flex-col sm:flex-row items-center gap-4 pb-4 border-b border-gray-200">
                {% if profile.profile_photo %}
                    <img src="{{ profile.profile_photo.url }}" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover border-2 border-gray-200">
                {% else %}
                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-gray-200 flex items-center justify-center text-3xl sm:text-4xl font-bold text-gray-600">
                        {{ user.username|first|upper }}
                    </div>
                {% endif %}
                <div class="flex-1 text-center sm:text-left">
                    <h2 class="text-lg font-bold text-gray-900">{{ user.get_full_name|default:user.username }}</h2>
                    <input type="file" name="profile_photo" class="mt-2 w-full text-xs sm:text-sm border border-gray-300 rounded px-3 py-2">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="full_name" value="{{ profile.user.get_full_name }}" placeholder="Your full name"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" value="{{ profile.user.email }}" readonly
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm bg-gray-100 cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    <input type="text" name="department" value="{{ profile.department }}" placeholder="e.g., CSE"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Batch</label>
                    <input type="text" name="batch" value="{{ profile.batch }}" placeholder="e.g., 52"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                    <input type="text" name="phone" value="{{ profile.phone }}" placeholder="+880 1XXX-XXXXXX"
                           class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
                <textarea name="bio" rows="3" placeholder="Tell us about yourself"
                          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">{{ profile.bio }}</textarea>
            </div>

            <button type="submit" class="w-full py-2.5 bg-gray-900 text-white rounded hover:bg-gray-800 font-medium text-sm">
                Update Profile
            </button>
        </form>
    </div>

</div>
{% endblock %}
