<!-- templates/accounts/login.html -->
{% extends "base.html" %}
{% block title %}Login • CampusCart Lite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
    <h1 class="text-2xl font-bold">Welcome back</h1>
    <p class="text-sm text-slate-600 mt-1">Login to continue.</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium mb-1">Username</label>
        <input name="username" type="text" required
          value="{{ username|default:'' }}"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <input name="password" type="password" required
          class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900" />
      </div>

      <button type="submit"
        class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-medium hover:bg-slate-800">
        Login
      </button>
    </form>

    <p class="text-sm text-slate-600 mt-4 text-center">
      New here?
      <a href="{% url 'register' %}" class="font-medium text-slate-900 underline">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
