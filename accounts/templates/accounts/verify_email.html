{% extends "base.html" %}
{% block title %}Verify Email • CampusCart Lite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
    <h1 class="text-2xl font-bold">Verify your email</h1>
    <p class="text-sm text-slate-600 mt-1">
      We sent a 6-digit code to <span class="font-medium">{{ email }}</span>.
    </p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium mb-1">Verification Code</label>
        <input name="code" type="text" maxlength="6" required
          class="w-full rounded-xl border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-900"
          placeholder="Enter 6-digit code" />
      </div>

      <button type="submit"
        class="w-full rounded-xl bg-slate-900 text-white py-2.5 font-medium hover:bg-slate-800">
        Verify & Create Account
      </button>
    </form>

    <div class="mt-4 text-center">
      <a href="{% url 'resend_code' %}" class="text-sm underline text-slate-700">
        Resend code
      </a>
    </div>
  </div>
</div>
{% endblock %}
