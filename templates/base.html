<!-- templates/base.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CampusCart Lite{% endblock %}</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900 flex flex-col">

  <!-- ================= NAVBAR ================= -->
  <header class="bg-white border-b border-slate-200">
    <nav class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">

      <!-- Left: Logo -->
      <a href="{% url 'home' %}" class="text-lg font-bold">
        CampusCart <span class="text-slate-500">Lite</span>
      </a>

      <!-- Right: Menu -->
      <div class="flex items-center gap-3">
        {% if user.is_authenticated %}
          <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit"
              class="px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 transition">
              Logout
            </button>
          </form>
        {% else %}
          <a href="{% url 'login' %}"
             class="px-3 py-2 rounded-lg hover:bg-slate-100 transition">
            Login
          </a>

          <a href="{% url 'register' %}"
             class="px-3 py-2 rounded-lg bg-slate-900 text-white hover:bg-slate-800 transition">
            Register
          </a>
        {% endif %}
      </div>

    </nav>
  </header>

  <!-- ================= MESSAGES ================= -->
  {% if messages %}
    <div class="max-w-6xl mx-auto px-4 mt-4 space-y-2">
      {% for message in messages %}
        <div class="rounded-xl px-4 py-3 border bg-white
          {% if message.tags == 'error' %}
            border-red-200 text-red-700
          {% elif message.tags == 'success' %}
            border-green-200 text-green-700
          {% else %}
            border-slate-200 text-slate-700
          {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- ================= PAGE CONTENT ================= -->
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- ================= FOOTER ================= -->
  <footer class="bg-white border-t border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-6 text-sm text-slate-500 text-center">
      © {% now "Y" %} CampusCart Lite
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
